<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kali Term">
<meta name="theme-color" content="#0d0d0d">
<title>Kali Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  :root {
    --bg:        #0d0d0d;
    --term-bg:   #0f0f0f;
    --bar-bg:    #161616;
    --border:    #222;
    --kali-blue: #2fa8e8;
    --white:     #e2e2e2;
    --green:     #5af78e;
    --red:       #ff5c57;
    --yellow:    #f3f99d;
    --cyan:      #9aedfe;
    --magenta:   #ff6ac1;
    --dim:       #4a4a4a;
    --key-bg:    #1c1c1c;
    --key-act:   #2a2a2a;
    --key-spec:  #193a52;
    --key-border:#2a2a2a;
  }

  html, body { height:100%; width:100%; overflow:hidden; background:var(--bg); font-family:'JetBrains Mono',monospace; color:var(--white); }

  /* 100% of the visual viewport so the system keyboard shrinks the layout naturally */
  #app { display:flex; flex-direction:column; height:100%; width:100%; }

  /* TITLE BAR */
  #titlebar {
    flex-shrink:0; background:var(--bar-bg);
    border-bottom:1px solid var(--border);
    padding:10px 14px;
    padding-top: max(10px, env(safe-area-inset-top));
    display:flex; align-items:center; gap:10px; user-select:none;
  }
  .dots { display:flex; gap:6px; }
  .dot  { width:11px; height:11px; border-radius:50%; }
  .dot.r{background:#ff5f57;}.dot.y{background:#febc2e;}.dot.g{background:#28c840;}
  #tb-title { flex:1; text-align:center; font-size:11px; color:#555; letter-spacing:.5px; display:flex; align-items:center; justify-content:center; gap:6px; }
  #tb-title svg{width:13px;height:13px;}
  #tb-title span{color:var(--kali-blue);font-weight:700;letter-spacing:1px;}
  #clear-btn { background:none; border:1px solid #2a2a2a; border-radius:5px; color:#555; font-size:10px; padding:4px 9px; cursor:pointer; font-family:inherit; transition:all .15s; }
  #clear-btn:active{background:#222;color:#aaa;}

  /* TERMINAL */
  #terminal {
    flex:1; overflow-y:auto; overflow-x:hidden;
    padding:10px 10px 6px; line-height:1.7; font-size:12px;
    cursor:text; -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
  }
  #terminal::-webkit-scrollbar{display:none;}

  .banner { color:var(--kali-blue); white-space:pre; font-size:5.5px; line-height:1.25; margin-bottom:8px; opacity:0; animation:fi .4s ease .1s forwards; }
  .banner-sub { color:#333; font-size:10px; margin-bottom:14px; opacity:0; animation:fi .4s ease .4s forwards; }

  .out-line { white-space:pre-wrap; word-break:break-all; margin-bottom:1px; animation:fi .12s ease forwards; }
  .out-line.dim    {color:var(--dim);}
  .out-line.green  {color:var(--green);}
  .out-line.red    {color:var(--red);}
  .out-line.yellow {color:var(--yellow);}
  .out-line.cyan   {color:var(--cyan);}
  .out-line.magenta{color:var(--magenta);}
  .out-line.blue   {color:var(--kali-blue);}

  .p-row{display:flex;flex-wrap:wrap;align-items:baseline;margin-bottom:1px;animation:fi .12s ease forwards;}
  .pu{color:var(--green);font-weight:700;} .pat{color:var(--white);}
  .ph{color:var(--kali-blue);font-weight:700;} .ps{color:var(--dim);}
  .pp{color:var(--cyan);} .psym{color:var(--green);margin:0 5px 0 3px;}
  .spacer{height:5px;}

  #input-wrap{display:flex;align-items:center;flex-wrap:wrap;padding-bottom:2px;}
  #cmd-input{background:transparent;border:none;outline:none;color:var(--white);font-family:inherit;font-size:12px;flex:1;min-width:60px;caret-color:var(--green);line-height:1.7;}

  /* SLIM TOOLBAR */
  #kb-area {
    flex-shrink:0; background:var(--bar-bg); border-top:1px solid var(--border);
    padding:5px 6px; padding-bottom:max(5px, env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:4px; user-select:none;
  }

  /* quick-command scrollable pills */
  #cmd-pills { display:flex; gap:4px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
  #cmd-pills::-webkit-scrollbar{display:none;}
  .pill {
    flex-shrink:0; background:#193a52; border:1px solid #1a4a6a;
    border-radius:6px; color:var(--cyan); font-family:inherit; font-size:10px;
    padding:5px 11px; cursor:pointer; transition:background .1s; white-space:nowrap;
  }
  .pill:active{background:#1e5070;}

  /* action row: history nav, tab, enter, ^C */
  #action-row { display:flex; gap:4px; }
  .act {
    flex:1; background:#1c1c1c; border:1px solid #2a2a2a; border-bottom:2px solid #0a0a0a;
    border-radius:6px; color:#aaa; font-family:inherit; font-size:11px; font-weight:700;
    padding:8px 4px; cursor:pointer; text-align:center;
    transition:background .08s, transform .08s;
    -webkit-user-select:none;
  }
  .act:active{background:#2a2a2a; transform:scale(.96);}
  .act-enter{background:#143a24; color:var(--green); border-color:#1a4a2e; flex:2.5;}
  .act-enter:active{background:#1c4e30;}
  .act-ctrl{background:#2a1414; color:var(--red); border-color:#3a1a1a;}
  .act-ctrl:active{background:#3a1e1e;}

  @keyframes fi{from{opacity:0;transform:translateY(2px);}to{opacity:1;transform:translateY(0);}}

  /* desktop: hide toolbar, bigger font */
  @media(min-width:768px){
    #kb-area{display:none;}
    #terminal{font-size:13px;}
    .banner{font-size:7.5px;}
    #cmd-input{font-size:13px;}
  }
</style>
</head>
<body>
<div id="app">

  <div id="titlebar">
    <div class="dots"><div class="dot r"></div><div class="dot y"></div><div class="dot g"></div></div>
    <div id="tb-title">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#2fa8e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>kali@kali — bash</span>
    </div>
    <button id="clear-btn" onclick="clearTerm()">CLR</button>
  </div>

  <div id="terminal" onclick="focusInput()">
    <div class="banner" id="banner"></div>
    <div class="banner-sub">Kali Linux 2024.3 — The Art of Exploitation</div>
    <div id="output"></div>
    <div id="input-wrap"></div>
  </div>

  <!-- Slim toolbar: pills + action buttons. System keyboard handles typing. -->
  <div id="kb-area">
    <div id="cmd-pills">
      <button class="pill" onclick="pillCmd('help')">help</button>
      <button class="pill" onclick="pillCmd('nmap -A 10.10.10.55')">nmap -A</button>
      <button class="pill" onclick="pillCmd('nmap -sV 10.10.10.55')">nmap -sV</button>
      <button class="pill" onclick="pillCmd('gobuster dir -u http://10.10.10.55 -w /usr/share/wordlists/dirb/common.txt')">gobuster</button>
      <button class="pill" onclick="pillCmd('nikto -h 10.10.10.55')">nikto</button>
      <button class="pill" onclick="pillCmd('dirb http://10.10.10.55')">dirb</button>
      <button class="pill" onclick="pillCmd('wpscan --url http://10.10.10.55 --enumerate u,p')">wpscan</button>
      <button class="pill" onclick="pillCmd('sqlmap -u "http://target/page?id=1" --dbs')">sqlmap</button>
      <button class="pill" onclick="pillCmd('searchsploit apache 2.4')">searchsploit</button>
      <button class="pill" onclick="pillCmd('msfconsole')">msfconsole</button>
      <button class="pill" onclick="pillCmd('msfvenom -p windows/x64/meterpreter/reverse_tcp LHOST=192.168.1.42 LPORT=4444 -f exe -o shell.exe')">msfvenom</button>
      <button class="pill" onclick="pillCmd('crackmapexec smb 192.168.1.0/24 -u admin -p password123 --shares')">cme</button>
      <button class="pill" onclick="pillCmd('hydra -l admin -P wordlist.txt 192.168.1.50 ssh')">hydra</button>
      <button class="pill" onclick="pillCmd('john hashes.txt --wordlist=/usr/share/wordlists/rockyou.txt')">john</button>
      <button class="pill" onclick="pillCmd('hashcat -m 0 -a 0 hashes.txt rockyou.txt')">hashcat</button>
      <button class="pill" onclick="pillCmd('aircrack-ng -w /usr/share/wordlists/rockyou.txt -b AA:BB:CC:DD:EE:FF capture-01.cap')">aircrack</button>
      <button class="pill" onclick="pillCmd('airodump')">airodump</button>
      <button class="pill" onclick="pillCmd('enum4linux 10.10.10.55')">enum4linux</button>
      <button class="pill" onclick="pillCmd('linpeas')">linpeas</button>
      <button class="pill" onclick="pillCmd('nc -l 4444')">nc -l</button>
      <button class="pill" onclick="pillCmd('ifconfig')">ifconfig</button>
      <button class="pill" onclick="pillCmd('whoami')">whoami</button>
      <button class="pill" onclick="pillCmd('cat credentials.txt')">cat creds</button>
      <button class="pill" onclick="pillCmd('ls')">ls</button>
      <button class="pill" onclick="pillCmd('curl -v http://target.local')">curl</button>
      <button class="pill" onclick="pillCmd('curl -I http://target.local')">curl -I</button>
      <button class="pill" onclick="pillCmd('curl http://target.local/robots.txt')">curl robots</button>
      <button class="pill" onclick="pillCmd('wget http://target.local/file.php')">wget</button>
    </div>
    <div id="action-row">
      <button class="act" onclick="histUp()">▲</button>
      <button class="act" onclick="histDown()">▼</button>
      <button class="act" onclick="doTab()">TAB</button>
      <button class="act act-enter" onclick="doEnter()">ENTER ↵</button>
      <button class="act act-ctrl" onclick="doCtrlC()">^C</button>
    </div>
  </div>

</div>
<script>
/* ── BANNER ── */
const bannerTxt = `  ██╗  ██╗ █████╗ ██╗     ██╗    ██╗     ██╗███╗   ██╗██╗   ██╗██╗  ██╗
  ██║ ██╔╝██╔══██╗██║     ██║    ██║     ██║████╗  ██║██║   ██║╚██╗██╔╝
  █████╔╝ ███████║██║     ██║    ██║     ██║██╔██╗ ██║██║   ██║ ╚███╔╝ 
  ██╔═██╗ ██╔══██║██║     ██║    ██║     ██║██║╚██╗██║██║   ██║ ██╔██╗ 
  ██║  ██╗██║  ██║███████╗██║    ███████╗██║██║ ╚████║╚██████╔╝██╔╝ ██╗
  ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚═╝    ╚══════╝╚═╝╚═╝  ╚═══╝ ╚═════╝ ╚═╝  ╚═╝`;
document.getElementById('banner').textContent = bannerTxt;

/* ── STATE ── */
let cwd       = '~';
let cmdHist   = [];
let histIdx   = -1;
let virtBuf   = '';
let msfActive = false;
let msfModule = null;
let msfOpts   = { RHOSTS:'', LHOST:'192.168.1.42', LPORT:'4444', PAYLOAD:'' };

const termEl   = document.getElementById('terminal');
const outputEl = document.getElementById('output');
const wrapEl   = document.getElementById('input-wrap');

/* ── VIRTUAL INPUT ── */
function getInp() { return document.getElementById('cmd-input'); }
function focusInput() {
  const inp = getInp();
  if (!inp) return;
  inp.focus();
  // Force system keyboard on iOS/Android by briefly making it editable
  inp.readOnly = false;
  inp.focus();
  inp.click();
  setTimeout(() => {
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
    inp.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }, 50);
}
function clearTerm()  { outputEl.innerHTML = ''; }
function scrollBottom(){ setTimeout(()=>{ termEl.scrollTop = termEl.scrollHeight; }, 60); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function typeChar(ch){
  virtBuf += ch;
  const inp = getInp();
  if(inp){ inp.value = virtBuf; inp.focus(); }
  scrollBottom();
}
function doBackspace(){
  virtBuf = virtBuf.slice(0,-1);
  const inp = getInp();
  if(inp){ inp.value = virtBuf; inp.focus(); }
}
function doEnter(){ commitCommand(virtBuf.trim()); virtBuf = ''; }
function doCtrlC(){
  appendPromptLine(virtBuf+'^C', msfActive);
  virtBuf = ''; addSpacer();
  msfActive ? addMsfInput() : addInput();
  scrollBottom();
}
function insertCmd(cmd){
  virtBuf = cmd;
  const inp = getInp();
  if(inp){ inp.value = virtBuf; inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  scrollBottom();
}
// Pill tap: insert command text but keep system keyboard open
function pillCmd(cmd){
  virtBuf = cmd;
  const inp = getInp();
  if(inp){ inp.value = virtBuf; inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  scrollBottom();
}
function histUp(){
  if(histIdx < cmdHist.length-1) histIdx++;
  virtBuf = cmdHist[cmdHist.length-1-histIdx]||'';
  const inp=getInp(); if(inp) inp.value=virtBuf;
}
function histDown(){
  if(histIdx>0) histIdx--; else{ histIdx=-1; virtBuf=''; }
  virtBuf = histIdx>=0?(cmdHist[cmdHist.length-1-histIdx]||''):'';
  const inp=getInp(); if(inp) inp.value=virtBuf;
}
function doTab(){
  const parts=virtBuf.split(' '), last=parts[parts.length-1];
  const matches=(fs[cwd]||[]).filter(e=>e.startsWith(last));
  if(matches.length===1){ parts[parts.length-1]=matches[0]; virtBuf=parts.join(' '); const inp=getInp(); if(inp) inp.value=virtBuf; }
  else if(matches.length>1) appendLines(matches.map(m=>({t:m,c:'cyan'})));
}

/* ── DOM HELPERS ── */
function appendLines(lines){
  lines.forEach(l=>{
    if(l===null) return;
    const d=document.createElement('div');
    d.className='out-line '+(l.c||'');
    d.textContent=l.t;
    outputEl.appendChild(d);
  });
  scrollBottom();
}
function addSpacer(){ const d=document.createElement('div'); d.className='spacer'; outputEl.appendChild(d); }

function appendPromptLine(cmdText, isMsf){
  const d=document.createElement('div'); d.className='p-row';
  if(isMsf){
    const mn=msfModule?msfModule.split('/').pop():'';
    d.innerHTML=`<span style="color:#e55">${msfModule?'msf6 exploit':'msf6'}</span>`+
      (msfModule?`<span style="color:#aaa">(</span><span style="color:var(--yellow)">${mn}</span><span style="color:#aaa">)</span>`:'')+
      `<span style="color:var(--green)"> &gt; </span><span style="color:var(--white)">${esc(cmdText)}</span>`;
  } else {
    d.innerHTML=`<span class="pu">┌──(kali</span><span class="pat">㉿</span><span class="ph">kali</span><span class="ps">)-[</span><span class="pp">${cwd}</span><span class="ps">]</span><br>`+
      `<span class="pu">└─</span><span class="psym">#</span><span style="color:var(--white)">${esc(cmdText)}</span>`;
  }
  outputEl.appendChild(d);
}

function makeInput(){
  const el = document.createElement('input');
  el.id = 'cmd-input';
  el.type = 'text';
  el.setAttribute('autocomplete','off');
  el.setAttribute('autocorrect','off');
  el.setAttribute('autocapitalize','none');
  el.setAttribute('spellcheck','false');
  el.setAttribute('inputmode','text');
  el.setAttribute('enterkeyhint','send');
  el.style.cssText = 'background:transparent;border:none;outline:none;color:var(--white);font-family:inherit;font-size:12px;flex:1;min-width:80px;caret-color:var(--green);line-height:1.7;width:100%;';
  el.value = virtBuf;
  el.addEventListener('keydown', handleKey);
  el.addEventListener('input', e=>{ virtBuf = e.target.value; });
  return el;
}

function addInput(){
  wrapEl.innerHTML = '';
  const row1 = document.createElement('div');
  row1.className = 'p-row'; row1.style.width='100%';
  row1.innerHTML = `<span class="pu">┌──(kali</span><span class="pat">㉿</span><span class="ph">kali</span><span class="ps">)-[</span><span class="pp">${cwd}</span><span class="ps">]</span>`;
  const row2 = document.createElement('div');
  row2.style.cssText = 'display:flex;align-items:center;width:100%;';
  row2.innerHTML = `<span class="pu">└─</span><span class="psym">#</span>`;
  row2.appendChild(makeInput());
  wrapEl.appendChild(row1);
  wrapEl.appendChild(row2);
  getInp().focus();
  scrollBottom();
}

function addMsfInput(){
  const mn = msfModule ? msfModule.split('/').pop() : '';
  wrapEl.innerHTML = '';
  const row = document.createElement('div');
  row.style.cssText = 'display:flex;align-items:center;width:100%;flex-wrap:wrap;';
  row.innerHTML =
    `<span style="color:#e55">${msfModule?'msf6 exploit':'msf6'}</span>`+
    (msfModule?`<span style="color:#aaa">(</span><span style="color:var(--yellow)">${mn}</span><span style="color:#aaa">)</span>`:'')+
    `<span style="color:var(--green)"> &gt; </span>`;
  row.appendChild(makeInput());
  wrapEl.appendChild(row);
  getInp().focus();
  scrollBottom();
}

function handleKey(e){
  if(e.key==='Enter')     { e.preventDefault(); doEnter(); }
  else if(e.key==='ArrowUp')   { e.preventDefault(); histUp(); }
  else if(e.key==='ArrowDown') { e.preventDefault(); histDown(); }
  else if(e.key==='Tab')       { e.preventDefault(); doTab(); }
  else if(e.ctrlKey&&e.key==='l'){ e.preventDefault(); clearTerm(); }
  else if(e.ctrlKey&&e.key==='c'){ e.preventDefault(); doCtrlC(); }
  else virtBuf=e.target.value;
}

/* ── FILESYSTEM ── */
const fs = {
  '~':['Desktop','Documents','Downloads','Music','Pictures','Videos','tools'],
  '~/Desktop':['target.txt','notes.md'],
  '~/Documents':['report.pdf','credentials.txt','pentest_notes.txt'],
  '~/Downloads':['nmap-7.94.tar.gz','exploit.py','wordlist.txt'],
  '~/tools':['metasploit','burpsuite','sqlmap','hydra'],
  '~/tools/metasploit':['msfconsole','msfvenom','modules'],
};

/* ── COMMANDS ── */
const cmds = {
  help:()=>[
    {t:'',c:''},{t:'  ╔════════════════════════════════════════════╗',c:'cyan'},
    {t:'  ║       Kali Linux — Command Reference       ║',c:'cyan'},
    {t:'  ╚════════════════════════════════════════════╝',c:'cyan'},{t:'',c:''},
    {t:'  ── System ──────────────────────────────────',c:'yellow'},
    {t:'  whoami  id  hostname  uname -a  date',c:''},
    {t:'  ifconfig  netstat  ps  w  uptime',c:''},
    {t:'  ls  cd  pwd  cat  echo  clear  history',c:''},{t:'',c:''},
    {t:'  ── Recon & Scanning ─────────────────────────',c:'yellow'},
    {t:'  nmap <target> [-sV] [-sC] [-A] [-O]',c:''},
    {t:'  nikto -h <target> [-p PORT]',c:''},
    {t:'  enum4linux <target>',c:''},
    {t:'  searchsploit <term>',c:''},{t:'',c:''},
    {t:'  ── Web Enumeration & Transfer ──────────────────',c:'yellow'},
    {t:'  gobuster dir -u URL -w WORDLIST [-x ext]',c:''},
    {t:'  dirb URL [WORDLIST]',c:''},
    {t:'  wpscan --url URL [--enumerate u,p,t]',c:''},
    {t:'  sqlmap -u URL [--dbs][--tables][--dump]',c:''},
    {t:'  curl URL [-v][-I][-X POST][-d DATA][-H HDR]',c:''},
    {t:'  wget URL [-O FILE] [-q] [-r]',c:''},{t:'',c:''},
    {t:'  ── Exploitation ─────────────────────────────',c:'yellow'},
    {t:'  msfconsole  (use/set/show options/run/back)',c:''},
    {t:'  msfvenom -p PAYLOAD LHOST=IP LPORT=P -f FMT',c:''},
    {t:'  crackmapexec smb TARGET -u USER -p PASS',c:''},{t:'',c:''},
    {t:'  ── Password Attacks ─────────────────────────',c:'yellow'},
    {t:'  john <file> [--wordlist=FILE] [--format=X]',c:''},
    {t:'  hashcat -m MODE -a TYPE hashfile wordlist',c:''},
    {t:'  hydra -l USER -P LIST TARGET SERVICE',c:''},{t:'',c:''},
    {t:'  ── Wireless ─────────────────────────────────',c:'yellow'},
    {t:'  aircrack-ng -w WORDLIST -b BSSID cap.cap',c:''},
    {t:'  airodump  (scan/capture APs & handshakes)',c:''},{t:'',c:''},
    {t:'  ── Post-Exploitation ────────────────────────',c:'yellow'},
    {t:'  linpeas    (privesc enumeration)',c:''},
    {t:'  nc -l PORT  /  nc HOST PORT  (netcat)',c:''},{t:'',c:''},
  ],
  whoami:()=>[{t:'root',c:'green'}],
  id:    ()=>[{t:'uid=0(root) gid=0(root) groups=0(root)',c:''}],
  hostname:()=>[{t:'kali',c:''}],
  pwd:   ()=>[{t:cwd.replace('~','/root'),c:''}],
  date:  ()=>[{t:new Date().toString(),c:''}],
  uptime:()=>[{t:' '+new Date().toTimeString().slice(0,8)+' up 4:20,  1 user,  load average: 0.42, 0.37, 0.28',c:''}],
  uname: (a)=>[{t:a.includes('-a')||a.includes('-r')?'Linux kali 6.6.9-amd64 #1 SMP PREEMPT_DYNAMIC Kali 6.6.9-1kali1 x86_64 GNU/Linux':'Linux',c:''}],

  ls:(a)=>{
    const e=fs[cwd]||[]; if(!e.length) return [{t:'',c:''}];
    const dirs=['Desktop','Documents','Downloads','Music','Pictures','Videos','tools','metasploit','burpsuite','sqlmap','hydra','modules'];

const MSF_MODS = {
  'exploit/windows/smb/ms17_010_eternalblue':{desc:'EternalBlue SMB RCE',cve:'CVE-2017-0143'},
  'exploit/multi/handler':{desc:'Generic Payload Handler'},
  'exploit/windows/smb/psexec':{desc:'Windows Authenticated PSExec'},
  'exploit/unix/ftp/vsftpd_234_backdoor':{desc:'VSFTPD 2.3.4 Backdoor',cve:'CVE-2011-2523'},
  'auxiliary/scanner/smb/smb_ms17_010':{desc:'MS17-010 SMB Detection'},
  'auxiliary/scanner/portscan/tcp':{desc:'TCP Port Scanner'},
  'post/multi/recon/local_exploit_suggester':{desc:'Local Exploit Suggester'},
};

function handleMsfCmd(cmd){
  if(!cmd){ addSpacer(); addMsfInput(); return; }
  appendPromptLine(cmd, true);
  const parts=cmd.trim().split(/\s+/); const n=parts[0].toLowerCase(); const a=parts.slice(1);

  if(n==='exit'||n==='quit'){ msfActive=false; msfModule=null; addSpacer(); addInput(); scrollBottom(); return; }
  if(n==='back'){ msfModule=null; addSpacer(); addMsfInput(); scrollBottom(); return; }
  if(n==='clear'){ outputEl.innerHTML=''; addMsfInput(); return; }

  if(n==='search'){
    const q=a.join(' ').toLowerCase();
    const hits=Object.entries(MSF_MODS).filter(([k,v])=>k.includes(q)||v.desc.toLowerCase().includes(q));
    appendLines([{t:'',c:''},{t:'Matching Modules',c:'cyan'},{t:'',c:''},
      {t:'  #  Name                                          Description',c:'yellow'},
      {t:'  -  ----                                          -----------',c:'dim'},
      ...hits.map(([k,v],i)=>({t:`  ${i}  ${k.padEnd(46)} ${v.desc}`,c:''})),
      ...(hits.length?[]:[{t:`No results for '${q}'`,c:'red'}]),
      {t:'',c:''},
    ]);
  }
  else if(n==='use'){
    const mod=a.join(' ');
    const key=Object.keys(MSF_MODS).find(k=>k===mod||k.endsWith('/'+mod));
    if(key){
      msfModule=key;
      msfOpts.PAYLOAD=key.includes('windows')?'windows/x64/meterpreter/reverse_tcp':'linux/x86/meterpreter/reverse_tcp';
      appendLines([{t:`[*] Using payload ${msfOpts.PAYLOAD}`,c:'dim'},{t:'',c:''}]);
    } else appendLines([{t:`[-] Module not found: ${mod}`,c:'red'}]);
  }
  else if(n==='info'){
    const m=msfModule?MSF_MODS[msfModule]:null;
    if(!m) appendLines([{t:'No module selected.',c:'red'}]);
    else appendLines([{t:'',c:''},{t:`Name:   ${m.desc}`,c:''},{t:`Module: ${msfModule}`,c:''},{t:`Rank:   Excellent`,c:'green'},
      ...(m.cve?[{t:`CVE:    ${m.cve}`,c:'red'}]:[]),{t:'',c:''}]);
  }
  else if(n==='show'&&a[0]==='options'){
    appendLines([{t:'',c:''},{t:`Module: ${msfModule||'none selected'}`,c:'cyan'},{t:'',c:''},
      {t:'  Name    Current Setting  Required',c:'yellow'},
      {t:`  RHOSTS  ${(msfOpts.RHOSTS||'').padEnd(15)}  yes`,c:msfOpts.RHOSTS?'':'red'},
      {t:`  LHOST   ${msfOpts.LHOST.padEnd(15)}  yes`,c:''},
      {t:`  LPORT   ${msfOpts.LPORT.padEnd(15)}  yes`,c:''},
      {t:`  PAYLOAD ${msfOpts.PAYLOAD||'(not set)'}`,c:''},
      {t:'',c:''}]);
  }
  else if(n==='show'&&a[0]==='payloads'){
    appendLines([{t:'',c:''},{t:'Compatible Payloads',c:'cyan'},
      {t:'  0  windows/x64/meterpreter/reverse_tcp',c:''},
      {t:'  1  linux/x86/meterpreter/reverse_tcp',c:''},
      {t:'  2  generic/shell_reverse_tcp',c:''},
      {t:'',c:''}]);
  }
  else if(n==='set'){
    if(a[0]&&a.length>1){ msfOpts[a[0].toUpperCase()]=a.slice(1).join(' ');
      appendLines([{t:`${a[0].toUpperCase()} => ${a.slice(1).join(' ')}`,c:'green'}]); }
    else appendLines([{t:'Usage: set OPTION VALUE',c:'red'}]);
  }
  else if(n==='run'||n==='exploit'){
    if(!msfModule) appendLines([{t:'[-] No module selected.',c:'red'}]);
    else if(!msfOpts.RHOSTS) appendLines([{t:'[-] Set RHOSTS first: set RHOSTS <target>',c:'red'}]);
    else appendLines([
      {t:'',c:''},
      {t:`[*] Started reverse TCP handler on ${msfOpts.LHOST}:${msfOpts.LPORT}`,c:'dim'},
      {t:`[*] Connecting to target ${msfOpts.RHOSTS}:445...`,c:'dim'},
      {t:`[+] Connection established`,c:'green'},
      {t:`[+] Target OS: Windows 7 SP1 x64`,c:'green'},
      {t:`[+] Sending exploit payload...`,c:'green'},
      {t:`[+] ETERNALBLUE overwrite completed (0xC000000D)!`,c:'green'},
      {t:`[*] Sending stage (200774 bytes) to ${msfOpts.RHOSTS}`,c:''},
      {t:`[*] Meterpreter session 1 opened → ${msfOpts.LHOST}:${msfOpts.LPORT} at ${new Date().toLocaleString()}`,c:'green'},
      {t:'',c:''},{t:'meterpreter > ',c:'yellow'},
    ]);
  }
  else if(n==='sessions'){
    appendLines([{t:'',c:''},{t:'Active sessions',c:'cyan'},
      {t:'  Id  Type                     Connection',c:'yellow'},
      {t:`  1   meterpreter x64/windows  ${msfOpts.LHOST}:${msfOpts.LPORT} -> ${msfOpts.RHOSTS||'10.10.10.55'}`,c:'green'},
      {t:'',c:''}]);
  }
  else if(n==='help'){
    appendLines([{t:'',c:''},{t:'search <term>    — find modules',c:'cyan'},
      {t:'use <module>     — select a module',c:'cyan'},
      {t:'info             — module details',c:'cyan'},
      {t:'show options     — current options',c:'cyan'},
      {t:'show payloads    — compatible payloads',c:'cyan'},
      {t:'set KEY VALUE    — set option',c:'cyan'},
      {t:'run / exploit    — launch module',c:'cyan'},
      {t:'sessions         — active sessions',c:'cyan'},
      {t:'back / exit      — navigate/quit',c:'cyan'},{t:'',c:''}]);
  }
  else appendLines([{t:`[-] Unknown command: ${n}. Type 'help'`,c:'red'}]);

  addSpacer(); addMsfInput(); scrollBottom();
}

/* ── MAIN DISPATCH ── */
function commitCommand(cmd){
  histIdx=-1;
  if(msfActive){ if(cmd) cmdHist.push(cmd); handleMsfCmd(cmd); return; }
  appendPromptLine(cmd, false);
  if(cmd) cmdHist.push(cmd);
  if(cmd){
    const parts=cmd.trim().split(/\s+/); const n=parts[0]; const a=parts.slice(1);
    if(n==='clear') outputEl.innerHTML='';
    else if(cmds[n]){ const r=cmds[n](a); if(r&&r.length) appendLines(r); }
    else appendLines([{t:`bash: ${n}: command not found`,c:'red'}]);
  }
  addSpacer();
  if(!msfActive) addInput();
  scrollBottom();
}

/* ── BOOT ── */
addInput();
scrollBottom();
